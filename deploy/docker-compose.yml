# tenk 배포용 compose — 맥(arm64) 서버에서 실행.
# 윈도우에서 빌드해 Docker Hub(hjson248/tenk)에 올린 이미지를 pull 해서 MariaDB와 함께 띄운다.
# 비밀번호는 같은 폴더의 .env 로 주입(.env 는 절대 커밋 금지).
#
# 맥에 둘 파일은 이 폴더 기준 2개뿐:
#   - docker-compose.yml  (이 파일)
#   - schema.sql          (리포의 docs/schema.sql 을 같은 폴더에 복사 — dbinit 볼륨 시드 원본)
#   + .env                (.env.example 복사 후 비밀번호 채움)

name: tenk

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    # 닉네임/메모에 이모지·한글이 들어가므로 서버 기본 문자셋을 utf8mb4 로 강제.
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    # DB 는 internal 네트워크에만 둬서 Traefik/외부와 격리. backend 만 접근한다.
    networks:
      - internal
    environment:
      MARIADB_DATABASE: tenk
      MARIADB_USER: tenk
      MARIADB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}
    volumes:
      - db-data:/var/lib/mysql
      # 첫 기동(빈 데이터 디렉토리)일 때만 자동 실행 → tenk 스키마 + 배지 마스터 데이터 적재.
      # ~/Documents 밑은 macOS TCC 로 bind mount 불가라 named volume(dbinit) 사용.
      # dbinit 는 schema.sql 을 01-schema.sql 로 담아 시딩해 둠(리포 docs/schema.sql = 원본).
      - dbinit:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    image: hjson248/tenk:latest
    restart: unless-stopped
    # DB 가 "건강"해진(스키마 적용 완료) 뒤에야 백엔드 기동.
    # ddl-auto=validate 라서 스키마가 먼저 있어야 부팅이 성공한다.
    depends_on:
      db:
        condition: service_healthy
    # web = Traefik(공유 엣지)이 라우팅하는 네트워크, internal = db 접근용.
    networks:
      - web
      - internal
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 이미지에 굽지 않고 런타임 주입 (prod yaml 의 TODO 플레이스홀더를 env 가 덮어씀).
      SPRING_DATASOURCE_URL: "jdbc:mariadb://db:3306/tenk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul"
      SPRING_DATASOURCE_USERNAME: tenk
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      TENK_UPLOAD_DIR: /app/uploads
      # Traefik(443, TLS 종단) 뒤라서 X-Forwarded-Proto=https 를 신뢰해야 Swagger 가
      # https 서버 URL 을 만든다. 안 켜면 mixed content 로 "주의 요함" 표시.
      # (application-prod.yaml 에도 있지만, 이미지 재빌드 없이 즉시 적용되게 env 로도 둠.)
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    # 외부 접속은 Traefik(443)이 담당. 8080 퍼블리시는 맥 로컬 curl 헬스체크 전용
    # (라우터에서 8080 은 포워딩 안 하므로 인터넷엔 안 열린다).
    ports:
      - "8080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tenk.rule=Host(`tenk.hjson248.com`)"
      - "traefik.http.routers.tenk.entrypoints=websecure"
      - "traefik.http.routers.tenk.tls.certresolver=le"
      - "traefik.http.services.tenk.loadbalancer.server.port=8080"
      - "traefik.docker.network=web"
    volumes:
      # 업로드된 영상은 컨테이너가 지워져도 보존되게 named volume 에.
      - uploads:/app/uploads

# web 은 리버스 프록시 공유 엣지(별도 리포 `reverse-proxy`)와 공유하는 external 네트워크.
# 그 엣지 스택이 이 네트워크를 만들고 소유한다. 사전에 한 번:  docker network create web
# tenk 는 여기에 join + backend 라벨로 라우팅만 선언한다(엣지 파일은 안 건드림).
networks:
  web:
    external: true
  internal:
    driver: bridge

volumes:
  db-data:
  uploads:
  dbinit:   # schema.sql(→01-schema.sql) 시딩. ~/Documents bind mount 회피용.
