spring:
  application:
    name: tenk

  profiles:
    active: local

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

tenk:
  upload:
    base-dir: ${TENK_UPLOAD_DIR:./uploads}
  auth:
    jwt:
      # HS256 비밀키 (Base64 권장, 256bit 이상). 로컬 전용.
      secret: dGVuay1sb2NhbC1qd3Qtc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtMTIzNDU2Nzg=
      access-token-ttl: PT1H
      refresh-token-ttl: P14D
      issuer: tenk
    kakao:
      # 카카오 디벨로퍼스의 REST API 키 = app client_id (access_token_info.app_id와 매칭 검증용)
      app-id: ${KAKAO_APP_ID:0}
      # 모바일 SDK가 access token을 발급받아오므로 server-side client-secret은 사실상 미사용.
      # /v1/user/access_token_info 와 /v2/user/me 만 사용함.

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
