spring:
  application:
    name: tenk

  profiles:
    active: local

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

tenk:
  upload:
    base-dir: ${TENK_UPLOAD_DIR:./uploads}
  auth:
    jwt:
      # secret은 환경별 profile(application-{local,prod}.yaml)에서 박는다.
      # 여기에 공통 fallback을 두면 prod에서 dev 키가 그대로 새어나갈 수 있어 의도적으로 비워둠.
      # 부팅 시 secret이 없으면 JwtTokenProvider 초기화 단계에서 즉시 실패함.
      access-token-ttl: PT1H
      refresh-token-ttl: P14D
      issuer: tenk
    kakao:
      # 카카오 디벨로퍼스 → 내 앱 → 요약 정보의 "앱 ID" (숫자). REST API/네이티브/JS 키와 다른 값.
      # access_token_info 응답의 app_id 필드와 일치 검증해서 다른 앱 토큰을 차단한다.
      # 네이티브 앱 키(영숫자)는 Flutter 측 KakaoSdk.init에서만 사용한다.
      app-id: 1459747
  test:
    # 테스트 전용 기능(카카오 우회 로그인 + 상태별 챌린지 시딩) 킬스위치. 공통 기본값은 잠금.
    # 환경별 profile 에서 켜고, 배포는 TENK_TEST_ENABLED 환경변수로 재빌드 없이 토글.
    enabled: false
    login-key:
    provider-user-id-prefix: "test-"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
